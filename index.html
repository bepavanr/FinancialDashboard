<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-color: #f0f4f8;
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-border: rgba(255, 255, 255, 0.5);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
        }

        .top-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 100;
            align-items: center;
        }

        /* --- Custom Searchable Dropdown --- */
        .custom-select-wrapper {
            position: relative;
            user-select: none;
            width: 280px;
        }

        .custom-select-trigger {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(200, 200, 200, 0.5);
            background: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .custom-select-trigger:hover {
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        .custom-options-container {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            background: #ffffff;
            border: 1px solid rgba(200, 200, 200, 0.5);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            display: none;
            flex-direction: column;
        }

        .custom-options-container.open {
            display: flex;
        }

        .search-box {
            padding: 10px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .search-box input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            width: 100%;
        }

        .search-box input:focus {
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
            border-color: var(--primary);
            background: #ffffff;
        }

        .options-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .options-list::-webkit-scrollbar {
            width: 8px;
        }
        .options-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .option-item {
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .option-item:hover {
            background: #f1f5f9;
        }

        /* --- Main Dashboard layout --- */
        .dashboard-container {
            width: 100%;
            max-width: 1400px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 15px;
            margin-top: 33px; /* Precision margin to sit exactly 12px (~3mm) below the absolute country box */
        }

        @media (max-width: 800px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        h2 {
            font-weight: 600;
            font-size: 1.15rem;
            margin-bottom: 10px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 8px 12px;
            font-size: 0.9rem;
            border: 1px solid rgba(200, 200, 200, 0.5);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.8);
            color: var(--text-main);
            font-family: inherit;
            transition: all 0.3s ease;
            height: 36px; /* Reduced fixed height */
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            background: #ffffff;
        }

        .loans-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 10px;
        }

        /* Single Horizontal Box Layout */
        .loan-card {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 12px 15px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: 2fr 1.5fr 0.8fr 0.8fr 1.2fr 36px; /* Bank, Amount, Rate, Years, EMI, Button */
            gap: 12px;
            align-items: end; /* Aligns all inputs and button to the bottom line */
            position: relative;
            animation: fadeIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .loan-card .input-group {
            margin-bottom: 0;
        }

        @media (max-width: 1100px) {
            .loan-card {
                grid-template-columns: 1fr 1fr;
                align-items: start;
            }
        }
        
        @media (max-width: 600px) {
            .loan-card {
                grid-template-columns: 1fr;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-remove-loan-inline {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: none;
            border-radius: 8px;
            width: 36px;
            height: 36px; /* Matches input height */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        .btn-remove-loan-inline:hover {
            background: var(--danger);
            color: white;
            transform: scale(1.05);
        }

        .loan-emi-value {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-main);
            white-space: nowrap;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 6px 10px;
            font-size: 0.8rem;
        }
        
        .btn-outline:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .summary-card {
            position: sticky;
            top: 40px;
        }

        .summary-item {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .summary-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .summary-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .summary-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -1px;
        }

        .summary-value.positive {
            color: var(--success);
        }

        .summary-value.negative {
            color: var(--danger);
        }

        .auto-save-indicator {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 0.75rem;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .auto-save-indicator.visible {
            opacity: 1;
        }

        .auto-save-indicator.visible::before {
            content: '●';
            color: var(--success);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <!-- Top Right Controls -->
    <div class="top-controls">
        <div id="authButtons" style="display: flex; gap: 10px;">
            <button class="btn" style="background: rgba(255, 255, 255, 0.8); color: var(--text-main); border: 1px solid rgba(200, 200, 200, 0.5); height: 46px; border-radius: 12px; font-size: 0.95rem; display: flex; align-items: center; backdrop-filter: blur(10px); transition: all 0.3s ease;" onmouseover="this.style.background='#ffffff'; this.style.borderColor='var(--primary)';" onmouseout="this.style.background='rgba(255, 255, 255, 0.8)'; this.style.borderColor='rgba(200, 200, 200, 0.5)';" onclick="window.signInWithGoogle()">Sign In</button>
            <button class="btn btn-primary" style="height: 46px; border-radius: 12px; font-size: 0.95rem; display: flex; align-items: center;" onclick="window.signInWithGoogle()">Sign Up</button>
        </div>
        <div id="userProfile" style="display: none; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(200, 200, 200, 0.5); border-radius: 12px; padding: 4px 12px 4px 4px; backdrop-filter: blur(10px); height: 46px;">
            <img id="userAvatar" src="" alt="User" style="width: 38px; height: 38px; border-radius: 50%; object-fit: cover;">
            <span id="userName" style="font-size: 0.9rem; font-weight: 500; color: var(--text-main); max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></span>
            <button onclick="window.signOutUser()" style="background: none; border: none; color: var(--danger); font-size: 0.85rem; font-weight: 600; cursor: pointer; margin-left: 5px;">Logout</button>
        </div>
        <button class="btn btn-primary" onclick="alert('Financial Tips:\n1. Save at least 20% of your income.\\n2. Keep your debt-to-income ratio below 35%.\\n3. Build an emergency fund for 3-6 months of expenses.')" style="height: 46px; border-radius: 12px; font-size: 0.95rem; display: flex; align-items: center; gap: 8px;">
            <span style="font-size: 1.2rem;">💡</span> Financial Tips
        </button>
        <!-- Custom Searchable Dropdown -->
        <div class="custom-select-wrapper" id="countrySelectorWrapper">
            <div class="custom-select-trigger" id="countrySelectorTrigger">
                <span id="selectedCountry">🇮🇳 India (INR)</span>
                <span style="font-size: 0.8rem; opacity: 0.5;">▼</span>
            </div>
            <div class="custom-options-container" id="countryOptionsContainer">
                <div class="search-box">
                    <input type="text" id="countrySearchInput" placeholder="Search country...">
                </div>
                <div class="options-list" id="countryOptionsList">
                    <!-- Javascript populates this -->
                </div>
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div class="dashboard-container">
        <div class="main-content">
            <div class="glass-panel" style="margin-bottom: 20px; display: flex; gap: 15px; width: fit-content; position: relative;">
                <div class="auto-save-indicator" id="autoSaveIndicator" style="top: -20px; right: 0;">Auto-saved</div>
                <div class="input-group" style="margin-bottom: 0; width: 7cm;">
                    <label for="monthlySalary" style="font-weight: 700; font-size: 1.05rem; color: var(--text-main); margin-bottom: 10px;">Monthly Salary (<span class="currency-symbol">₹</span>)</label>
                    <input type="number" id="monthlySalary" placeholder="e.g. 50000" oninput="calculate()">
                </div>
                <div class="input-group" style="margin-bottom: 0; width: 7cm;">
                    <label for="otherIncome" style="font-weight: 700; font-size: 1.05rem; color: var(--text-main); margin-bottom: 10px; white-space: nowrap;">Other Income (<span class="currency-symbol">₹</span>)</label>
                    <input type="number" id="otherIncome" placeholder="e.g. 10000" oninput="calculate()">
                </div>
            </div>

            <div class="glass-panel">
                <h2>
                    Active Loans
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-outline" onclick="clearData()">Clear All Data</button>
                        <button class="btn btn-primary" onclick="addLoan()">+ Add Loan</button>
                    </div>
                </h2>
                
                <div id="loansList" class="loans-list">
                    <!-- Dynamic loans appear here -->
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="glass-panel summary-card">
                <h2>Summary</h2>
                
                <div class="summary-item">
                    <div class="summary-label">Monthly Income</div>
                    <div class="summary-value" id="dispSalary">₹0.00</div>
                </div>

                <div class="summary-item">
                    <div class="summary-label">Total Monthly EMI</div>
                    <div class="summary-value negative" id="dispEmi">-₹0.00</div>
                </div>

                <div class="summary-item">
                    <div class="summary-label">Remaining Salary</div>
                    <div class="summary-value positive" id="dispBalance">₹0.00</div>
                </div>

                <div style="margin-top: 30px; position: relative; height: 220px; width: 100%; display: flex; justify-content: center;">
                    <canvas id="financeChart"></canvas>
                </div>
                
                <div style="margin-top: 25px; text-align: center; padding-top: 20px; border-top: 1px solid rgba(0, 0, 0, 0.08);">
                    <div style="font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 6px;">Debt-to-Income Ratio</div>
                    <div id="debtRatioDisplay" style="font-size: 1.8rem; font-weight: 700; color: var(--text-main);">0.0%</div>
                </div>
            </div>
        </div>
    </div>

        // Custom Dropdown Logic
        const wrapper = document.getElementById('countrySelectorWrapper');

        let loanIdCounter = 0;

        // Register ChartDataLabels globally
        Chart.register(ChartDataLabels);

        function updateChart(salary, totalEmi) {
            const ctx = document.getElementById('financeChart').getContext('2d');
            const remaining = Math.max(0, salary - totalEmi);
            
            const data = [totalEmi, remaining];
            const labels = ['Total EMI', 'Remaining Salary'];
            const colors = ['#ef4444', '#10b981']; // danger red, success green

            // Calculate and Update Debt Ratio
            let debtRatio = 0;
            if (salary > 0) {
                debtRatio = (totalEmi / salary) * 100;
            }
            const debtRatioEl = document.getElementById('debtRatioDisplay');
            if (debtRatioEl) {
                debtRatioEl.innerText = debtRatio.toFixed(1) + '%';
                // Dynamic color based on financial health
                if (debtRatio === 0) debtRatioEl.style.color = 'var(--text-main)';
                else if (debtRatio <= 35) debtRatioEl.style.color = 'var(--success)'; // Good
                else if (debtRatio <= 50) debtRatioEl.style.color = '#f59e0b'; // Warning/Amber
                else debtRatioEl.style.color = 'var(--danger)'; // Danger
            }

            // If empty, show a gray placeholder pie
            if (salary === 0 && totalEmi === 0) {
                data[0] = 0; data[1] = 1; 
                colors[0] = '#e2e8f0'; colors[1] = '#e2e8f0';
            }

            if (financeChart) {
                financeChart.data.datasets[0].data = data;
                financeChart.data.datasets[0].backgroundColor = colors;
                financeChart.update();
            } else {
                financeChart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            backgroundColor: colors,
                            borderWidth: 2,
                            borderColor: '#ffffff',
                            hoverOffset: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    color: '#1e293b',
                                    font: { family: 'Inter', size: 13 },
                                    padding: 15
                                }
                            },
                            datalabels: {
                                color: '#ffffff',
                                font: {
                                    weight: 'bold',
                                    size: 14,
                                    family: 'Inter'
                                },
                                formatter: (value, context) => {
                                    // Don't show labels on empty placeholder
                                    if (salary === 0 && totalEmi === 0) return '';
                                    
                                    let sum = 0;
                                    let dataArr = context.chart.data.datasets[0].data;
                                    dataArr.forEach(data => {
                                        sum += data;
                                    });
                                    if (sum === 0) return '';
                                    let percentage = (value * 100 / sum).toFixed(1) + '%';
                                    
                                    // Hide 0% labels for clean UI
                                    if (value === 0) return '';
                                    
                                    return percentage;
                                }
                            }
                        }
                    }
                });
            }

        function renderOptions(filterText = "") {
            optionsList.innerHTML = "";
            const filtered = countries.filter(c => c.name.toLowerCase().includes(filterText.toLowerCase()));
            
            if(filtered.length === 0) {
                optionsList.innerHTML = `<div class="option-item" style="color:#999; cursor:default; justify-content:center;">No results found</div>`;

            filtered.forEach(c => {

                div.className = 'option-item';
                div.innerHTML = `<span>${c.flag}</span> <span>${c.name} (${c.code})</span>`;
                div.onclick = () => selectCountry(c);
                optionsList.appendChild(div);
            });
        }

        function selectCountry(c) {

            currentCurrencySymbol = c.symbol;

        // Financial Logic & Data Persistence
        function addLoan(data = null) {
            const loansList = document.getElementById('loansList');
            const id = loanIdCounter++;
            
            const bankVal = data ? data.bank : '';
            const amountVal = data ? data.amount : '';
            const rateVal = data ? data.rate : '';
            const durationVal = data ? data.duration : '';
            
            const loanHTML = `
                <div class="loan-card" id="loan-${id}">
                    <div class="input-group">
                        <label>Bank Name</label>
                        <input type="text" class="loan-bank" placeholder="e.g. HDFC" value="${bankVal}" oninput="calculate()">
                    </div>
                    <div class="input-group">
                        <label>Amount (<span class="currency-symbol">${currentCurrencySymbol}</span>)</label>
                        <input type="number" class="loan-amount" placeholder="e.g. 10000" value="${amountVal}" oninput="calculate()">
                    </div>
                    <div class="input-group">
                        <label>Rate (%)</label>
                        <input type="number" class="loan-rate" placeholder="e.g. 5.5" step="0.1" value="${rateVal}" oninput="calculate()">
                    </div>
                    <div class="input-group">
                        <label>Years</label>
                        <input type="number" class="loan-duration" placeholder="e.g. 5" value="${durationVal}" oninput="calculate()">

                    </div>
                    <button class="btn-remove-loan-inline" onclick="removeLoan(${id})" title="Remove Loan">✕</button>
                </div>
            `;
            
            loansList.insertAdjacentHTML('beforeend', loanHTML);
            if (!isInitialLoad) calculate();
        }

        function removeLoan(id) {
            const loanElement = document.getElementById(`loan-${id}`);
            if (loanElement) {
                loanElement.remove();
                calculate();
            }
        }

        function calculate() {
            const salaryInput = document.getElementById('monthlySalary').value;
            const otherIncomeInput = document.getElementById('otherIncome').value;
            const baseSalary = parseFloat(salaryInput) || 0;
            const otherIncome = parseFloat(otherIncomeInput) || 0;
            const salary = baseSalary + otherIncome;

            const loanCards = document.querySelectorAll('.loan-card');
            let totalEmi = 0;

            loanCards.forEach(card => {
                const p = parseFloat(card.querySelector('.loan-amount').value) || 0;
                const annualRate = parseFloat(card.querySelector('.loan-rate').value) || 0;
                const years = parseFloat(card.querySelector('.loan-duration').value) || 0;
                const emiDisplay = card.querySelector('.emi-value');

                let emi = 0;

                if (p > 0 && annualRate > 0 && years > 0) {
                    const r = (annualRate / 100) / 12; 
                    const n = years * 12; 
                    
                    emi = (p * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
                    totalEmi += emi;
                } else if (p > 0 && annualRate === 0 && years > 0) {
                    emi = p / (years * 12);
                    totalEmi += emi;
                }
                
                emiDisplay.innerText = formatCurrency(emi);
            });

            const balance = salary - totalEmi;

            document.getElementById('dispSalary').innerText = formatCurrency(salary);
            document.getElementById('dispEmi').innerText = '-' + formatCurrency(totalEmi);
            
            const dispBalance = document.getElementById('dispBalance');
            dispBalance.innerText = formatCurrency(balance);
            
            if (balance < 0) {
                dispBalance.classList.remove('positive');
                dispBalance.classList.add('negative');
            } else {
                dispBalance.classList.remove('negative');
                dispBalance.classList.add('positive');
            }

            if (!isInitialLoad) {
                saveData();
            }

            updateChart(salary, totalEmi);
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('en-IN', {
                style: 'currency',
                currency: currentCurrencyCode,
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(value);
        }

        // --- Data Persistence using Local Storage ---
        
        let saveTimeout;
        
        function saveData() {
            const salary = document.getElementById('monthlySalary').value;
            const otherIncome = document.getElementById('otherIncome').value;
            const loans = [];
            document.querySelectorAll('.loan-card').forEach(card => {
                loans.push({
                    bank: card.querySelector('.loan-bank').value,
                    amount: card.querySelector('.loan-amount').value,
                    rate: card.querySelector('.loan-rate').value,
                    duration: card.querySelector('.loan-duration').value
                });
            });
            const data = {
                countryName: currentCountryName,
                currencyCode: currentCurrencyCode,
                salary: salary,
                otherIncome: otherIncome,
                loans: loans
            };
            localStorage.setItem('financialDashboardData', JSON.stringify(data));
            
            // Show auto-save indicator
            autoSaveIndicator.classList.add('visible');
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                autoSaveIndicator.classList.remove('visible');
            }, 2000);
        }

        function loadData() {
            const saved = localStorage.getItem('financialDashboardData');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    
                    // Restore Currency
                    if (data.countryName) {
                        const c = countries.find(x => x.name === data.countryName);
                        if (c) {
                            currentCountryName = c.name;
                            currentCurrencyCode = c.code;
                            currentCurrencySymbol = c.symbol;
                            selectedDisplay.innerHTML = `<span>${c.flag}</span> <span>${c.name} (${c.code})</span>`;
                            document.querySelectorAll('.currency-symbol').forEach(el => {
                                el.innerText = currentCurrencySymbol;
                            });
                        }
                    } else if (data.currencyCode) {
                        const c = countries.find(x => x.code === data.currencyCode);
                        if (c) {
                            currentCountryName = c.name;
                            currentCurrencyCode = c.code;
                            currentCurrencySymbol = c.symbol;
                            selectedDisplay.innerHTML = `<span>${c.flag}</span> <span>${c.name} (${c.code})</span>`;
                            document.querySelectorAll('.currency-symbol').forEach(el => {
                                el.innerText = currentCurrencySymbol;
                            });
                        }
                    }

                    // Restore Salary
                    if (data.salary !== undefined) {
                        document.getElementById('monthlySalary').value = data.salary;
                    }
                    if (data.otherIncome !== undefined) {
                        document.getElementById('otherIncome').value = data.otherIncome;
                    }

                    // Restore Loans
                    if (data.loans && data.loans.length > 0) {
                        document.getElementById('loansList').innerHTML = ''; // clear any existing
                        data.loans.forEach(loanData => addLoan(loanData));
                    } else {
                        addLoan(); // default empty if none saved
                    }
                } catch (e) {
                    console.error("Error loading saved data", e);
                    addLoan();
                }
            } else {
                addLoan(); // default empty
            }
            
            isInitialLoad = false;
            calculate();
        }

        function clearData() {
            if(confirm("Are you sure you want to clear all data and start over?")) {
                localStorage.removeItem('financialDashboardData');
                document.getElementById('monthlySalary').value = '';
                document.getElementById('otherIncome').value = '';
                document.getElementById('loansList').innerHTML = '';
                
                // Reset to default India
                const india = countries.find(x => x.name === "India");
                if(india) selectCountry(india);

                addLoan();
                calculate();
            }
        }

        // Initialize application by loading data
        loadData();

            signInWithPopup(auth, provider).catch(error => {
                console.error("Error signing in:", error);
                alert("Error signing in: " + error.message);
            });
        };

        window.signOutUser = () => {
            signOut(auth).catch(error => {
                console.error("Error signing out:", error);
            });
        };

        onAuthStateChanged(auth, (user) => {
            const authButtons = document.getElementById('authButtons');
            const userProfile = document.getElementById('userProfile');
            const userAvatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');

            if (user) {
                authButtons.style.display = 'none';
                userProfile.style.display = 'flex';
                userAvatar.src = user.photoURL || 'https://via.placeholder.com/38';
                userName.textContent = user.displayName || user.email;
            } else {
                authButtons.style.display = 'flex';
                userProfile.style.display = 'none';
            }
        });
    </script>
</body>
</html>
